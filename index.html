<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizza Ortaklığı - Profesyonel</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #2c3e50; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #95a5a6; margin: auto; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #f1c40f; font-size: 22px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">KASA: <span id="moneyText">0</span>₺</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const moneyText = document.getElementById("moneyText");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // BURAYI RENDER'DAN ALDIĞIN LİNKLE DEĞİŞTİR!
        const socket = io("https://pizza-game-e7xn.onrender.com");

        let oyunVerisi = { oyuncular: {}, toplamPara: 0 };
        let benimKarakter = { x: canvas.width/2, y: canvas.height/2, pizzaVar: false };

        socket.on('guncelle', (data) => {
            oyunVerisi = data;
            moneyText.innerText = data.toplamPara;
        });

        function ciz() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. PİZZA FIRINI (Sol Üst)
            ctx.fillStyle = "#c0392b";
            ctx.fillRect(10, 10, 90, 90);
            ctx.fillStyle = "white";
            ctx.fillText("FIRIN (Al)", 25, 60);

            // 2. MÜŞTERİ MASASI (Sağ Üst)
            ctx.fillStyle = "#2980b9";
            ctx.fillRect(canvas.width - 100, 10, 90, 90);
            ctx.fillStyle = "white";
            ctx.fillText("MASA (Sat)", canvas.width - 85, 60);

            // 3. OYUNCULARI ÇİZ
            for (let id in oyunVerisi.oyuncular) {
                let p = oyunVerisi.oyuncular[id];
                
                // Karakter
                ctx.fillStyle = (id === socket.id) ? "#e74c3c" : "#3498db";
                ctx.beginPath();
                ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
                ctx.fill();

                // İsim Etiketi
                ctx.fillStyle = "white";
                ctx.font = "12px Arial";
                ctx.fillText(id === socket.id ? "Sen" : "Ortak", p.x - 15, p.y + 35);

                // Pizza Taşıma Görseli
                if (p.pizzaVar) {
                    ctx.fillStyle = "#f1c40f";
                    ctx.fillRect(p.x - 12, p.y - 35, 25, 8);
                }
            }
            requestAnimationFrame(ciz);
        }

        // HAREKET VE MANTIK
        canvas.addEventListener("touchmove", (e) => {
            let t = e.touches[0];
            benimKarakter.x = t.clientX;
            benimKarakter.y = t.clientY;

            // Fırından Pizza Al
            if (benimKarakter.x < 110 && benimKarakter.y < 110) {
                benimKarakter.pizzaVar = true;
            }

            // Masaya Pizza Bırak (Para Kazan)
            if (benimKarakter.pizzaVar && benimKarakter.x > canvas.width - 110 && benimKarakter.y < 110) {
                benimKarakter.pizzaVar = false;
                socket.emit('paraKazan', 10);
            }

            socket.emit('hareket', benimKarakter);
        });

        ciz();
    </script>
</body>
</html>
